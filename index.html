<!DOCTYPE html>
<html>
    <head>
        <title>Physics Simulator</title>
    <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <h1>Physics Simulator</h1>
        <h2>Projectile Motion Simulator</h2>
        <p>Initial velocity: <span id="velocityValue">50</span> m/s</p>
        <input type="range" id="velocity" min="10" max="100" value="50">

        <br><br>

        <p>Launch Angle: <span id="angleValue">45</span>°</p>
        <input type="range" id="angle" min="0" max="90" value="45">

        <br><br>

        <button id="launchBtn">Launch Projectile</button>
        <canvas id="Canvas" width="800" height="400"></canvas>

        <script src="script.js"></script>

        </body>
        </html>
