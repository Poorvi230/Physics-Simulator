<!DOCTYPE html>
<html>

<head>
    <title>Physics Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="space">

    <div class="container">

        <h1>🚀 Physics Simulator</h1>
        <h2>Projectile Motion Simulator</h2>
        <select id="themeSelect">
              <option value="space">🌌 Space</option>

    <option value="neon">⚡ Neon</option>

    <option value="retro">🎮 Retro</option>
       </select>
       <br><br>

        <p>
            Initial Velocity:
            <span id="velocityValue">50</span> m/s
        </p>

        <input type="range"
               id="velocity"
               min="10"
               max="100"
               value="50">

        <br><br>

        <p>
            Launch Angle:
            <span id="angleValue">45</span>°
        </p>

        <input type="range"
               id="angle"
               min="0"
               max="90"
               value="45">

        <br><br>

        <button id="launchBtn">
            Launch Rocket
        </button>

        <br><br>

        <canvas id="canvas"
                width="800"
                height="400">
        </canvas>

    </div>

    <script src="script.js"></script>

</body>
</html>
