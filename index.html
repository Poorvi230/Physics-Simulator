<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Physics Motion Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="space">

    <div class="container">
        <div class="main-header">
            <h1>🚀 Physics Simulator</h1>
            <h2>Projectile Motion Simulator</h2>
            
            <div class="selector-group">
                <select id="themeSelect">
                    <option value="space">🌌 Space</option>
                    <option value="neon">⚡ Neon</option>
                    <option value="retro">🎮 Retro</option>
                </select>

                <select id="experimentSelect">
                    <option value="projectile">🎯 Projectile Motion</option>
                    <option value="shm">🔄 Harmonic Motion (SHM)</option>
                </select>
            </div>
        </div>

        <div class="simulator-layout">
            
            <div class="controls-container">
                
                <div class="left-panel">
                    <div class="control-group">
                        <p>Initial Velocity: <span id="velocityValue">50</span> m/s</p>
                        <input type="range" id="velocity" min="10" max="100" value="50">
                    </div>

                    <div class="control-group">
                        <p>Launch Angle: <span id="angleValue">45</span>°</p>
                        <input type="range" id="angle" min="0" max="90" value="45">
                    </div>

                    <div class="control-group">
                        <p>Initial Height: <span id="heightValue">0</span> m</p>
                        <input type="range" id="height" min="0" max="100" value="0">
                    </div>
                    
                    <button id="launchBtn">Launch Rocket</button>
                </div>

                <div class="left-panel environmental-card">
                    <div class="control-group">
                        <p>Environment / Gravity:</p>
                        <select id="gravitySelect">
                            <option value="9.81">🌍 Earth (9.8 m/s²)</option>
                            <option value="1.62">🌕 Moon (1.6 m/s²)</option>
                            <option value="3.71">🔴 Mars (3.7 m/s²)</option>
                            <option value="0">🚀 Zero-G (0.0 m/s²)</option>
                        </select>
                    </div>

                    <div class="control-group" style="margin-top: 15px;">
                        <p>Air Resistance: <span id="dragValue">0.0</span></p>
                        <input type="range" id="drag" min="0" max="1" step="0.1" value="0">
                    </div>

                    <div class="control-group" style="margin-top: 15px;">
                        <p>Crosswind Speed: <span id="windValue">0</span> m/s</p>
                        <input type="range" id="wind" min="-20" max="20" step="1" value="0">
                    </div>
                </div>

            </div> <div class="right-panel">
                <canvas id="canvas" width="500" height="250"></canvas>
                <div class="graph-controls">
                    <button id="resetBtn">Reset</button>
                </div>
            </div>
        </div> ```

        <script src="script.js"></script>
    <script src="projectile.js"></script>
    <script src="shm.js"></script>
</body>
</html>
